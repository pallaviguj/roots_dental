<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Service - Roots Dental Speciality Clinic</title>
	<meta name="description" content="Learn about our dental services at Roots Dental Speciality Clinic in Nashik." />
	<link rel="icon" type="image/png" href="images/mini_logo_transparent.png" />
	<link rel="stylesheet" href="css/main.css" />
</head>
<body class="theme-light">
	<header></header>

	<main class="service-page">
		<section class="content-section service-detail">
			<div class="container service-detail-copy">
				<a href="/#services" class="service-back-link">← Back to services</a>

				<h1 id="serviceTitle" class="service-title"></h1>
				<p id="serviceIntro" class="service-intro"></p>
			</div>

			<div class="service-gallery">
				<div id="serviceImageGrid" class="service-image-grid"></div>
			</div>
		</section>
	</main>

	<footer id="footer"></footer>

	<a id="whatsappBtn"
	   class="whatsapp-float"
	   target="_blank"
	   rel="noopener noreferrer"
	   aria-label="Chat on WhatsApp">
		<svg class="whatsapp-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
			<path d="M16 0c-8.837 0-16 7.163-16 16 0 2.825 0.737 5.607 2.137 8.048l-2.137 7.952 8.194-2.116c2.366 1.288 5.040 1.978 7.806 1.978 8.837 0 16-7.163 16-16s-7.163-16-16-16zM16 29.467c-2.482 0-4.908-0.646-7.07-1.87l-0.507-0.292-5.246 1.354 1.401-5.208-0.321-0.525c-1.362-2.229-2.083-4.792-2.083-7.413 0-7.72 6.28-14 14-14s14 6.28 14 14-6.28 14-14 14zM21.804 18.613c-0.397-0.199-2.348-1.158-2.713-1.29-0.365-0.132-0.631-0.199-0.896 0.199s-1.028 1.29-1.261 1.556c-0.232 0.265-0.464 0.298-0.861 0.099s-1.68-0.619-3.199-1.973c-1.182-1.054-1.98-2.357-2.212-2.754s-0.025-0.611 0.174-0.809c0.179-0.178 0.397-0.464 0.596-0.696s0.265-0.397 0.397-0.662c0.132-0.265 0.066-0.497-0.033-0.696s-0.896-2.159-1.228-2.956c-0.322-0.776-0.65-0.671-0.896-0.684-0.232-0.012-0.497-0.015-0.762-0.015s-0.696 0.099-1.061 0.497c-0.365 0.397-1.394 1.362-1.394 3.321s1.427 3.852 1.625 4.117c0.199 0.265 2.807 4.285 6.796 6.009 0.95 0.411 1.691 0.656 2.269 0.839 0.955 0.303 1.824 0.26 2.512 0.158 0.766-0.114 2.348-0.96 2.679-1.888s0.331-1.723 0.232-1.888c-0.099-0.166-0.364-0.265-0.761-0.464z"/>
		</svg>
	</a>

	<button class="theme-toggle-float" onclick="toggleTheme()" aria-label="Toggle theme">
		<span class="theme-icon">🌙</span>
	</button>

	<div id="appointmentModal" class="modal">
		<div class="modal-content modal-wide">
			<button class="modal-close" onclick="closeAppointmentModal()">&times;</button>
			<h2>Book an Appointment</h2>

			<form id="bookingForm" class="booking-form">
				<div class="form-row">
					<div class="form-group">
						<label for="name">Full Name *</label>
						<input type="text" id="name" name="name" required>
					</div>
					<div class="form-group">
						<label for="email">Email *</label>
						<input type="email" id="email" name="email" required>
					</div>
				</div>
				<div class="form-row">
					<div class="form-group">
						<label for="phone">Phone Number *</label>
						<input type="tel" id="phone" name="phone" required>
					</div>
					<div class="form-group">
						<label for="treatment">Treatment *</label>
						<select id="treatment" name="treatment" required>
							<option value="">Select treatment</option>
							<option value="Root Canal Treatment">Root Canal Treatment</option>
							<option value="Consultation">Consultation</option>
							<option value="Follow-up">Follow-up</option>
							<option value="Emergency">Emergency</option>
						</select>
					</div>
				</div>
				<div class="form-group">
					<label for="appointmentDate">Select Date *</label>
					<input type="date" id="appointmentDate" name="date" required>
				</div>
				<div class="form-group">
					<label>Select Time *</label>
					<div id="slotsError" class="error-message" style="display: none;"></div>
					<div id="timeSlots" class="time-slots-container">
						<p class="helper-text">Please select a date to see available time slots</p>
					</div>
				</div>
				<div id="bookingError" class="error-message" style="display: none;"></div>
				<button type="submit" id="bookingSubmitBtn" class="btn btn-primary btn-large" disabled>
					Book Appointment
				</button>
			</form>
		</div>
	</div>
</body>
</html>
